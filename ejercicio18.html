<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación del DOM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            padding: 40px 20px;
        }

        h1 {
            color: #333;
        }

        .btn-eliminar {
            font-size: 13px;
        }

        #lista li {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1>Manipulación del DOM</h1>
                <p>Agrega elementos a la lista y elimínalos con el botón correspondiente.</p>

                <div class="card p-4">
                    <label for="campoTexto" class="form-label fw-bold">Nuevo elemento:</label>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control" id="campoTexto" placeholder="Escribe algo...">
                        <button class="btn btn-primary" id="btnAgregar">Agregar</button>
                    </div>

                    <p id="mensajeError" class="text-danger"></p>

                    <h5>Lista de elementos:</h5>
                    <ul id="lista" class="list-group">
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="js/ejercicio18.js"></script>
</body>

</html>
