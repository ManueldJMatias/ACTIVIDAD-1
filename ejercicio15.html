<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ejercicio 15 - Operaciones con Objetos</title>
    <link rel="stylesheet" href="css/ejercicio15.css">
</head>

<body>
    <h1>Registro de Estudiantes</h1>
    <p>Ingresa el nombre y calificación de cada estudiante para calcular el promedio, mayor y menor.</p>

    <div class="registro">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Ej: Juan">

        <label for="calificacion">Calificación:</label>
        <input type="text" id="calificacion" placeholder="Ej: 85">

        <p id="mensajeError" class="error"></p>

        <button onclick="agregar()">Agregar</button>
        <button onclick="calcular()">Calcular</button>

        <h3>Estudiantes:</h3>
        <ul id="listaEstudiantes"></ul>

        <div class="resultado">
            <label for="promedio">Promedio General:</label>
            <input type="text" id="promedio" readonly placeholder="—">
        </div>

        <div class="resultado">
            <label for="mayor">Calificación más alta:</label>
            <input type="text" id="mayor" readonly placeholder="—">
        </div>

        <div class="resultado">
            <label for="menor">Calificación más baja:</label>
            <input type="text" id="menor" readonly placeholder="—">
        </div>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>

</html>
